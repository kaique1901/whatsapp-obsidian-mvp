services:
  postgres:
    image: postgres:16-alpine
    container_name: whatsapp_obsidian_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-whatsapp_obsidian}
      POSTGRES_USER: ${POSTGRES_USER:-whatsapp}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init_db.sql:/docker-entrypoint-initdb.d/init_db.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-whatsapp} -d ${POSTGRES_DB:-whatsapp_obsidian}"]
      interval: 10s
      timeout: 5s
      retries: 5

  ollama:
    image: ollama/ollama:latest
    container_name: whatsapp_obsidian_ollama
    restart: unless-stopped
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "${OLLAMA_PORT:-11434}:11434"

  api:
    build: .
    container_name: whatsapp_obsidian_api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-whatsapp}:${POSTGRES_PASSWORD:-change-me}@postgres:5432/${POSTGRES_DB:-whatsapp_obsidian}
      OLLAMA_BASE_URL: http://ollama:11434
      OBSIDIAN_DAILY_DIR: /obsidian/WhatsApp/Daily
    volumes:
      - ${OBSIDIAN_VAULT_PATH:-./obsidian-vault}:/obsidian
    ports:
      - "${API_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      ollama:
        condition: service_started

volumes:
  postgres_data:
  ollama_data:
